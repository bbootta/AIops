name: validation-team-agent CI

on:
  push:
    branches: ["**"]
    paths:
      - "validation-team-agent/**"
      - ".github/workflows/validation-team-agent-ci.yml"
    paths-ignore:
      - "validation-team-agent/docs/**"
      - "validation-team-agent/examples/**"
      - "validation-team-agent/memory/**"
      - "validation-team-agent/skills/**"
      - "validation-team-agent/subagents/**"
      - "validation-team-agent/README.md"
      - "validation-team-agent/CLAUDE.md"
  pull_request:
    paths:
      - "validation-team-agent/**"
      - ".github/workflows/validation-team-agent-ci.yml"
    paths-ignore:
      - "validation-team-agent/docs/**"
      - "validation-team-agent/examples/**"
      - "validation-team-agent/memory/**"
      - "validation-team-agent/skills/**"
      - "validation-team-agent/subagents/**"
      - "validation-team-agent/README.md"
      - "validation-team-agent/CLAUDE.md"

concurrency:
  group: validation-team-agent-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: validation-team-agent
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            validation-team-agent/requirements.txt
            validation-team-agent/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate change_manifest schema
        run: |
          python -m tools.manifest validate

      - name: Validate orchestration_matrix schema
        run: |
          python - <<'PY'
          import json, jsonschema, pathlib
          schema = json.loads(pathlib.Path("harness/orchestration_matrix.schema.json").read_text(encoding="utf-8"))
          matrix = json.loads(pathlib.Path("harness/orchestration_matrix.json").read_text(encoding="utf-8"))
          jsonschema.validate(matrix, schema)
          print("orchestration_matrix.json validates against schema")
          PY

      - name: Lint policy thresholds
        run: |
          python -m tools.policy_lint

      - name: Run pytest
        run: |
          python -m pytest -q
