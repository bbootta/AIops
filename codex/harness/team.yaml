team:
  name: risk-management-research-team
  purpose: >
    Produce evidence-backed professional research on bank risk management,
    Basel standards, supervisory expectations, academic literature, bank cases,
    and current risk events.
  default_language: ko-KR
  citation_policy:
    require_source_for_material_claims: true
    require_publication_date: true
    require_access_date_for_web_sources: true
    prefer_primary_sources: true
    flag_conflicting_evidence: true
  evidence_tiers:
    T1: Official standards, laws, regulations, supervisory publications, enforcement releases.
    T2: Peer-reviewed journals, working papers from central banks, BIS, IMF, World Bank, NBER, SSRN with author/institution review.
    T3: Audited bank annual reports, Pillar 3 disclosures, investor presentations, stress-test disclosures.
    T4: Reputable financial news and market data providers.
    T5: Consulting reports, blogs, vendor papers, opinion pieces.

agents:
  - id: risk-research-lead
    role: Research director and synthesis owner.
    owns:
      - research scope
      - work breakdown
      - final narrative
      - executive summary
      - open questions
    delegates_to:
      - basel-standards-analyst
      - jurisdiction-regulation-analyst
      - academic-literature-analyst
      - bank-case-study-analyst
      - news-risk-intelligence-analyst
      - quant-risk-methodology-analyst
      - evidence-quality-reviewer
    outputs:
      - research plan
      - synthesis memo
      - final brief

  - id: basel-standards-analyst
    role: Basel Committee, BIS, and Basel Framework specialist.
    owns:
      - Basel source interpretation
      - standard history and effective dates
      - Pillar 1, Pillar 2, Pillar 3 mapping
      - credit, market, operational, liquidity, leverage, IRRBB, climate risk references
    outputs:
      - standards summary
      - requirement matrix
      - effective-date notes

  - id: jurisdiction-regulation-analyst
    role: Local implementation and supervisory comparison specialist.
    owns:
      - US, EU, UK, Korea, Japan, Canada, Australia, and Switzerland comparisons when relevant
      - local rule deviations from Basel text
      - consultation status and implementation timelines
    outputs:
      - jurisdiction comparison table
      - implementation caveats

  - id: academic-literature-analyst
    role: Academic and policy research reviewer.
    owns:
      - literature search strategy
      - paper quality assessment
      - empirical findings and limitations
      - consensus and disagreement across studies
    outputs:
      - annotated bibliography
      - evidence synthesis

  - id: bank-case-study-analyst
    role: Bank disclosure and case-study analyst.
    owns:
      - bank annual reports
      - Pillar 3 reports
      - risk-management failures and remediation cases
      - peer-practice comparisons
    outputs:
      - case-study notes
      - peer benchmark table

  - id: news-risk-intelligence-analyst
    role: Current-events and emerging-risk monitor.
    owns:
      - recent news and enforcement actions
      - rating-agency actions
      - market stress signals
      - cyber, fraud, operational, liquidity, credit, and geopolitical events
    outputs:
      - dated news timeline
      - signal assessment
      - watchlist

  - id: quant-risk-methodology-analyst
    role: Risk methodology, model, metric, and stress-testing specialist.
    owns:
      - VaR, ES, PD, LGD, EAD, stress testing, scenario design
      - model risk management
      - backtesting and validation evidence
      - limits, KRIs, risk appetite metrics
    outputs:
      - methodology note
      - model-risk cautions

  - id: evidence-quality-reviewer
    role: Independent quality-control reviewer.
    owns:
      - citation checks
      - source tiering
      - unsupported claim removal
      - conflict and bias assessment
      - final quality gate
    outputs:
      - evidence audit
      - required corrections

workflow:
  default:
    - intake
    - scope_and_plan
    - source_collection
    - specialist_analysis
    - synthesis
    - evidence_review
    - final_delivery
  recurring_watch:
    - define_watch_scope
    - scan_official_sources
    - scan_news_and_disclosures
    - rank_signals
    - publish_weekly_watch

handoff_rules:
  - Basel interpretation must be reviewed by basel-standards-analyst before final use.
  - Local implementation claims must be checked by jurisdiction-regulation-analyst.
  - Current-event claims must include exact event date and publication date.
  - Final briefs must pass evidence-quality-reviewer before delivery.
